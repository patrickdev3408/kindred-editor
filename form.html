function fmt(v, step){
  if(v===null||v===undefined||v==='') return '';
  const n = parseFloat(v);
  if(isNaN(n)) return '';
  if(step<0.1) return n.toFixed(2);
  if(step<1) return n.toFixed(1);
  return Math.round(n).toString();
}

function mkSel(options, val){
  const s = document.createElement('select');

  // If value not in options list, add it at top so it displays correctly

// ── LOAD ─────────────────────────────────────────────────────
// Sheets API read (fast - no cold start)
async function sheetsGet(range) {
  const url = SHEETS_BASE + '/' + SHEET_ID + '/values/' + 
    encodeURIComponent(SHEET_NAME + '!' + range) + 
    '?key=' + API_KEY;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Sheets API error: ' + res.status);
  const data = await res.json();
  return data.values || [];
}

// Get sheet using batchGet to skip the huge description columns (F-I)
async function sheetsGetAll() {
  // Fetch two ranges and merge: A:E (ID/Name/Tag/Tier/Class) + J:HP (stats/synergies/actions)
  // This skips col F (description) and G,H,I (play styles) which are long and unused
  const ranges = ['Characters!A:E', 'Characters!J:HP'];
  const url = SHEETS_BASE + '/' + SHEET_ID + '/values:batchGet?ranges=' + 
    ranges.map(r => encodeURIComponent(r)).join('&ranges=') +
    '&key=' + API_KEY;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Sheets API error: ' + res.status);
  const data = await res.json();
  const rangeA = (data.valueRanges[0].values || []);
  const rangeB = (data.valueRanges[1].values || []);
  // Merge: for each row, combine first 5 cols + 4 empty placeholders + rest
  const merged = [];
  const maxRows = Math.max(rangeA.length, rangeB.length);
  for(let i = 0; i < maxRows; i++){
    const a = rangeA[i] || [];
    const b = rangeB[i] || [];
    // Pad a to 5 cols, add 4 empty (F,G,H,I = description + playstyles), then b
    const row = [...a, ...Array(Math.max(0,5-a.length)).fill(''), '','','','', ...b];
    merged.push(row);
  }
  return merged;
}

// Apps Script still used for writes
async function apsFetch(url) {
  try {
    const res = await fetch(url, {method:'GET', redirect:'follow', credentials:'omit', mode:'cors'});
    const text = await res.text();
    const start = text.indexOf('{'); const end = text.lastIndexOf('}');
    if(start === -1) throw new Error('No JSON in response');
    return JSON.parse(text.slice(start, end+1));
  } catch(e) {
    return new Promise((resolve, reject) => {
      const cbName = '_cb' + Date.now();
      const timeout = setTimeout(() => {
        delete window[cbName];
        const s = document.getElementById('_jsonp_' + cbName);
        if(s) s.remove();
        reject(new Error('Request timed out'));
      }, 15000);
      window[cbName] = (data) => {
        clearTimeout(timeout);
        delete window[cbName];
        const s = document.getElementById('_jsonp_' + cbName);
        if(s) s.remove();
        resolve(data);
      };
      const s = document.createElement('script');
      s.id = '_jsonp_' + cbName;
      s.onerror = () => { clearTimeout(timeout); delete window[cbName]; s.remove(); reject(new Error('Script load failed')); };
      s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
      document.body.appendChild(s);
    });
  }
}


function updateCacheStatus(){

  } else {
    statusEl.textContent = '↓ ' + count + ' cached…';
    statusEl.style.color = '#70a8d0';
    statusEl.style.display = '';
  }
}

async function preloadRoster(){
  // Load all rows at once via Sheets API - fast single request
  const statusEl = document.getElementById('preload-status');
  if(statusEl){ statusEl.textContent = 'Loading roster…'; statusEl.style.display=''; statusEl.style.color='#70a8d0'; }
  try {
    const values = await sheetsGetAll();
    if(values && values.length > 1){
      rosterCache = {};
      for(let i = 1; i < values.length; i++){
        const row = values[i];
        // Pad row to consistent length
        while(row.length < 250) row.push('');
        const id = String(row[0]||'').trim();
        if(id) rosterCache[id] = { rowIndex: i+1, row };
      }
      batchDone = true;
      if(statusEl){
        statusEl.textContent = '✓ ' + Object.keys(rosterCache).length + ' characters ready';
        statusEl.style.color = '#80c880';
        setTimeout(()=>{ statusEl.style.display='none'; }, 2000);
      }
    }
  } catch(e) {
    if(statusEl){ statusEl.textContent = 'Roster load failed — loading individually'; statusEl.style.color='#e07070'; }
  }
}

    const v = parseFloat(charData[col])||0;
    const [mn,mx] = STAT_RANGES[name]||[0,100];
    const step = STAT_STEPS[name]||1;
    const pct = Math.max(0,Math.min(1,(v-mn)/(mx-mn)));
    const color = STAT_COLORS[name]||'#d4af37';

    const wrap = document.createElement('div');
    wrap.className='stat-wrap';

    const row = document.createElement('div');
    row.className='stat-row';
    const lbl = document.createElement('span');
    lbl.className='stat-lbl'; lbl.textContent=name;
    const valEl = document.createElement('span');
    valEl.className='stat-val'; valEl.style.color=color;
    valEl.textContent=fmt(v,step);
    row.appendChild(lbl); row.appendChild(valEl);
    wrap.appendChild(row);

    const track = document.createElement('div');
    track.className='stat-bar-track stat-track';
    const fill = document.createElement('div');
    fill.className='stat-fill';
    fill.style.cssText=`width:${pct*100}%;background:${color};`;
    track.appendChild(fill);

    function setVal(clientX){
      if(statsLocked) return;
      const rect = track.getBoundingClientRect();
      const p = Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
      let nv = mn+p*(mx-mn);
      nv = Math.round(nv/step)*step;
      nv = parseFloat(Math.max(mn,Math.min(mx,nv)).toFixed(4));
      charData[col] = nv;
      fill.style.width = (Math.max(0,Math.min(1,(nv-mn)/(mx-mn)))*100)+'%';
      valEl.textContent = fmt(nv,step);
    }
    track.style.cursor = statsLocked ? 'default' : 'pointer';
    track.onclick=e=>setVal(e.clientX);
    track.ontouchstart=e=>{if(!statsLocked){e.preventDefault();setVal(e.touches[0].clientX);}};
    wrap.appendChild(track);
    el.appendChild(wrap);
  });
}

// ── ACTIONS ──────────────────────────────────────────────────
function buildActions(){
  const el = document.getElementById('actions-content');
  el.innerHTML = '<p style="font-size:10px;color:#33334a;margin-bottom:8px;">Scroll right to see all actions →</p>';

  const FIELDS = [
    {label:'Name',       key:'NAME',      type:'text'},
    {label:'Dmg Type',   key:'DMGTYPE',   type:'sel', opts:()=>DMG_TYPES},
    {label:'Dmg Mod',    key:'DMGMOD',    type:'sel', opts:()=>OPTS_DMGMOD, num:true},
    {label:'AoE Pattern',key:'AOEPATTERN',type:'sel', opts:()=>AOE_PATTERNS},
    {label:'AoE Size',   key:'AOESIZE',   type:'sel', opts:()=>OPTS_AOESIZE, num:true},
    {label:'AoE Range',  key:'AOERANGE',  type:'sel', opts:()=>OPTS_AOERANGE, num:true},
    {label:'Energy',     key:'ENERGYCOST',type:'sel', opts:()=>OPTS_ENERGY},
    {label:'Cooldown',   key:'COOLDOWN',  type:'sel', opts:()=>OPTS_COOLDOWN, num:true},
    {label:'Trap Tick',  key:'TRAPTICK',  type:'sel', opts:()=>['','One_shot','Continuous']},
    {label:'E1 Type',    key:'E1TYPE',    type:'sel', opts:()=>EFF_TYPES},
    {label:'E1 Mag',     key:'E1MAG',     type:'sel', opts:()=>OPTS_MAG, num:true},
    {label:'E1 Dur',     key:'E1DUR',     type:'sel', opts:()=>OPTS_DUR, num:true},
    {label:'E2 Type',    key:'E2TYPE',    type:'sel', opts:()=>EFF_TYPES},
    {label:'E2 Mag',     key:'E2MAG',     type:'sel', opts:()=>OPTS_MAG, num:true},
    {label:'E2 Dur',     key:'E2DUR',     type:'sel', opts:()=>OPTS_DUR, num:true},
  ];

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'overflow-x:auto;-webkit-overflow-scrolling:touch;';

  const table = document.createElement('table');
  // 1 label col + 7 action cols
  const actionColWidth = 90;
  const labelColWidth = 80;
  const totalWidth = labelColWidth + actionColWidth * ACTION_SLOTS.length;
  table.style.cssText = 'border-collapse:collapse;font-size:11px;width:' + totalWidth + 'px;';

  const cellStyle = 'padding:4px 3px;border-bottom:1px solid #1a1a38;border-right:1px solid #161630;vertical-align:middle;';
  const labelStyle = 'padding:4px 6px;border-bottom:1px solid #1a1a38;background:#0a0a18;font-size:9px;color:#5a5a8a;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;position:sticky;left:0;z-index:2;';
  const inpStyle = 'background:#0c0c1e;border:1px solid #1e1e36;border-radius:3px;color:#e0e0f0;padding:3px 4px;font-size:11px;outline:none;width:100%;box-sizing:border-box;';
  const selStyle = inpStyle + 'cursor:pointer;';

  // Header row - action names
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  // Sticky top-left corner
  const cornerTh = document.createElement('th');
  cornerTh.style.cssText = labelStyle + 'background:#080810;position:sticky;left:0;top:0;z-index:3;min-width:' + labelColWidth + 'px;';
  cornerTh.textContent = 'Field';
  hrow.appendChild(cornerTh);
  ACTION_SLOTS.forEach(({label, nameCol}) => {
    const th = document.createElement('th');
    th.style.cssText = 'padding:4px 3px;background:#0a0a18;color:#d4af37;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #d4af3744;border-right:1px solid #161630;white-space:nowrap;min-width:' + actionColWidth + 'px;max-width:' + actionColWidth + 'px;position:sticky;top:0;z-index:1;';
    th.textContent = label;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  // One row per field
  FIELDS.forEach((field, fi) => {
    const tr = document.createElement('tr');
    tr.style.background = fi % 2 === 0 ? '#111122' : '#0d0d1a';

    // Sticky label cell
    const tdLbl = document.createElement('td');
    tdLbl.style.cssText = labelStyle + 'background:' + (fi%2===0?'#0e0e20':'#0b0b1a') + ';min-width:' + labelColWidth + 'px;';
    tdLbl.textContent = field.label;
    tr.appendChild(tdLbl);

    // One cell per action
    ACTION_SLOTS.forEach(({nameCol}) => {
      const c = col => nameCol + A[col];
      const td = document.createElement('td');
      td.style.cssText = cellStyle + 'min-width:' + actionColWidth + 'px;max-width:' + actionColWidth + 'px;';

      if(field.key === 'NAME') {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.value = String(charData[nameCol] || '');
        inp.style.cssText = inpStyle;
        inp.oninput = () => charData[nameCol] = inp.value;
        td.appendChild(inp);
      } else if(field.type === 'sel') {
        const raw = charData[c(field.key)];
        const displayVal = field.num ? (parseFloat(raw)||0) : (raw||'');
        const sel = mkSel(field.opts(), displayVal);
        sel.style.cssText = selStyle;
        sel.onchange = () => {
          charData[c(field.key)] = field.num ? parseFloat(sel.value) : sel.value;
        };
        td.appendChild(sel);
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrapper.appendChild(table);
  el.appendChild(wrapper);
}


function buildNumBar(label,val,mn,mx,step,color,onChange){
  const v=parseFloat(val)||mn;
  const pct=Math.max(0,Math.min(1,(v-mn)/(mx-mn)));
  const wrap=document.createElement('div');
  const row=document.createElement('div');
  row.style.cssText='display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;';
  const lbl=document.createElement('label'); lbl.className='lbl'; lbl.textContent=label;
  const valEl=document.createElement('span');
  valEl.style.cssText=`font-size:12px;color:${color};font-weight:700;`;
  valEl.textContent=step<0.1?v.toFixed(2):step<1?v.toFixed(1):Math.round(v).toString();
  row.appendChild(lbl); row.appendChild(valEl);
  wrap.appendChild(row);
  const track=document.createElement('div'); track.className='stat-track';
  const fill=document.createElement('div'); fill.className='stat-fill';
  fill.style.cssText=`width:${pct*100}%;background:${color};`;
  track.appendChild(fill);
  function setV(cx){
    const rect=track.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));
    let nv=mn+p*(mx-mn); nv=Math.round(nv/step)*step;
    nv=parseFloat(Math.max(mn,Math.min(mx,nv)).toFixed(4));
    onChange(nv); fill.style.width=(Math.max(0,Math.min(1,(nv-mn)/(mx-mn)))*100)+'%';
    valEl.textContent=step<0.1?nv.toFixed(2):step<1?nv.toFixed(1):Math.round(nv).toString();
  }
  track.onclick=e=>setV(e.clientX);
  track.ontouchstart=e=>{e.preventDefault();setV(e.touches[0].clientX);};
  wrap.appendChild(track);
  return wrap;
}

// ── TABS ─────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['stats','synergies','actions'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
}

// ── SAVE ─────────────────────────────────────────────────────
async function saveChar(){
  if(!charData){ alert('No character loaded.'); return; }
  msg('save-msg','Saving…','info');
  try {
    // Use POST to avoid URL length limits with large row data
    const body = JSON.stringify({action:'updateRow', rowIndex, row:charData});
    let saved = false;
    // Try POST with cors first
    try {
      const res = await fetch(APPS_URL, {
        method:'POST',
        body,
        redirect:'follow',
        mode:'cors',
        headers:{'Content-Type':'text/plain'}
      });
      const text = await res.text();
      const start = text.indexOf('{'); const end = text.lastIndexOf('}');
      if(start !== -1){
        const data = JSON.parse(text.slice(start, end+1));
        if(data.success) saved = true;
        if(data.error) throw new Error(data.error);
      } else { saved = true; } // no-cors returns empty body but still works
    } catch(e) {
      // Fallback: no-cors POST (data sends but no response)
      await fetch(APPS_URL, {
        method:'POST',
        body,
        mode:'no-cors',
        headers:{'Content-Type':'text/plain'}
      });
      saved = true;
    }
    if(saved){
      msg('save-msg','Saved ✓','ok');
      if(rosterCache && currentId) rosterCache[currentId] = {row:[...charData], rowIndex};
    }
    setTimeout(()=>msg('save-msg','','info'),3000);
  } catch(e) {
    msg('save-msg','Save failed: '+e.message,'err');
  }
}
