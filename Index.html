<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kindred Wars — Data Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#09091a;color:#e0e0f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
input,select,textarea,button{font-family:inherit;}
button{cursor:pointer;}

/* Layout */
#header{background:#0c0c1e;border-bottom:1px solid #181836;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:10;}
#content{flex:1;overflow-y:auto;padding:12px;}

/* Buttons */
.btn{border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;border:1px solid;}
.btn-gold{background:rgba(212,175,55,0.1);border-color:#d4af3744;color:#d4af37;}
.btn-blue{background:#0c1a2a;border-color:#1e3a5a;color:#70a8d0;}
.btn-green{background:#0c1a0c;border-color:#1e3a1e;color:#70b870;}
.btn-plain{background:#0d0d1a;border-color:#252540;color:#5a5a8a;}
.btn-back{background:none;border:none;color:#d4af37;font-size:22px;padding:0 8px 0 0;line-height:1;}
.btn-wide{width:100%;padding:11px;font-size:13px;font-weight:700;border-radius:8px;border:1px solid;}

/* Cards */
.card{background:#111122;border:1px solid #1a1a38;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.card-green{border-color:#1e2e1e;}
.sec-title{font-size:10px;color:#5a5a8a;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px;}

/* Form controls */
label.lbl{font-size:10px;color:#5a5a8a;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:3px;display:block;}
input[type=text],input[type=number],select{background:#0d0d1a;border:1px solid #252540;border-radius:5px;color:#e0e0f0;padding:6px 8px;font-size:13px;outline:none;width:100%;}
select{cursor:pointer;}
input[type=range]{width:100%;accent-color:#d4af37;cursor:pointer;height:22px;}

/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.span2{grid-column:1/-1;}

/* Char card */
.char-card{background:#0f0f20;border:1px solid #181834;border-radius:8px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.char-card:active{background:#161630;}
.char-id{font-family:monospace;font-size:10px;color:#2a2a4a;width:34px;flex-shrink:0;}
.char-name{font-size:13px;color:#d0d0e8;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.char-cls{font-size:11px;color:#33334a;margin-top:1px;}
.tier-badge{font-size:9px;border-radius:4px;padding:2px 6px;flex-shrink:0;font-weight:800;}

/* Stat bar */
.stat-bar-wrap{margin-bottom:10px;}
.stat-bar-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.stat-bar-lbl{font-size:10px;color:#5a5a8a;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.stat-bar-vals{display:flex;gap:8px;align-items:baseline;}
.stat-bar-cmp{font-size:10px;color:#6080a0;}
.stat-bar-avg{font-size:10px;color:#5a6a5a;}
.stat-bar-val{font-size:13px;font-weight:700;min-width:36px;text-align:right;}
.stat-bar-track{height:26px;background:#0d0d1a;border:1px solid #1e1e36;border-radius:5px;position:relative;cursor:pointer;overflow:hidden;touch-action:manipulation;}
.stat-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;transition:width 0.08s;}
.stat-bar-marker{position:absolute;top:0;bottom:0;width:2px;transform:translateX(-50%);}

/* Stepper */
.stepper{display:flex;align-items:center;background:#0d0d1a;border:1px solid #252540;border-radius:5px;overflow:hidden;}
.stepper-btn{background:#161630;border:none;color:#9090c0;font-size:20px;width:42px;height:36px;cursor:pointer;flex-shrink:0;line-height:1;display:flex;align-items:center;justify-content:center;}
.stepper-val{flex:1;text-align:center;color:#d4af37;font-size:13px;font-weight:700;}

/* Sub tabs */
.subtabs{display:flex;background:#0c0c1e;border-radius:8px;padding:3px;margin-bottom:8px;gap:3px;}
.subtab{flex:1;padding:7px 4px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;text-transform:capitalize;}
.subtab.active{background:#1a1a38;color:#d4af37;}
.subtab.inactive{background:transparent;color:#33334a;}

/* Tier filter */
.tier-filters{display:flex;gap:5px;margin-bottom:10px;}
.tier-btn{flex:1;padding:5px 2px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;flex-direction:column;padding:16px;}
.modal-box{background:#111122;border:1px solid #2a2a4a;border-radius:12px;display:flex;flex-direction:column;flex:1;overflow:hidden;max-height:90vh;}
.modal-header{padding:14px 16px;border-bottom:1px solid #1a1a38;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:13px;font-weight:800;}
.modal-sub{font-size:10px;color:#44446a;margin-top:2px;}
.modal-body{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.modal-footer{padding:12px;border-top:1px solid #1a1a38;display:flex;gap:8px;}

/* Action collapse */
.action-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.action-chevron{color:#33334a;font-size:16px;}

/* Search */
#search-input{flex:1;background:#0c0c1e;border:1px solid #181836;border-radius:8px;color:#d0d0e8;padding:8px 12px;font-size:13px;outline:none;}

textarea{background:#0a0a18;color:#c0c0e0;font-size:11px;font-family:monospace;border:none;outline:none;padding:12px;resize:none;line-height:1.4;flex:1;}
</style>

</head>
<body>

<div id="header">
  <button class="btn-back" id="btn-back" style="display:none">←</button>
  <div id="header-title" style="flex:1">
    <div style="font-size:14px;font-weight:800;color:#d4af37;letter-spacing:.05em">KINDRED WARS</div>
    <div style="font-size:9px;color:#22224a;letter-spacing:.12em">DATA EDITOR</div>
  </div>
  <button class="btn btn-gold" id="btn-new" style="display:none">+ New</button>
  <button class="btn btn-blue" id="btn-save">Save</button>
  <button class="btn btn-green" id="btn-csv">CSV</button>
</div>

<div id="content"></div>

<!-- Save Modal -->

<div class="modal-bg" id="modal-save" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <div><div class="modal-title" style="color:#70a8d0">Save Data</div><div class="modal-sub">Copy this text and paste it into Notes or anywhere safe</div></div>
      <button class="btn-plain btn" onclick="closeModal('save')">✕</button>
    </div>
    <textarea id="save-textarea" readonly style="flex:1;min-height:200px"></textarea>
    <div style="padding:12px;border-top:1px solid #1a1a38">
      <button class="btn-wide" id="btn-copy" style="background:rgba(212,175,55,0.12);border-color:#d4af3766;color:#d4af37" onclick="copyAll()">Copy All Text</button>
    </div>
  </div>
</div>

<!-- Load Modal -->

<div class="modal-bg" id="modal-load" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <div><div class="modal-title" style="color:#70a8d0">Load Save</div><div class="modal-sub">Paste your previously saved text below</div></div>
      <button class="btn-plain btn" onclick="closeModal('load')">✕</button>
    </div>
    <div style="padding:12px;flex:1;display:flex;flex-direction:column;gap:10px">
      <textarea id="load-textarea" placeholder="Paste save data here..." style="flex:1;min-height:200px;border:1px solid #252540;border-radius:6px"></textarea>
      <div id="load-msg" style="font-size:11px;color:#c06060;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-wide" id="btn-load-confirm" style="flex:1;background:rgba(100,160,220,0.12);border-color:#1e4a7a;color:#70a8d0" onclick="loadData()">Load Data</button>
      <button class="btn btn-plain" onclick="closeModal('load')">Cancel</button>
    </div>
  </div>
</div>

<!-- Add Character Modal -->

<div class="modal-bg" id="modal-add" style="display:none;align-items:center;justify-content:center">
  <div style="background:#111122;border:1px solid #2a2a4a;border-radius:12px;padding:24px;width:100%;max-width:300px">
    <div style="font-size:14px;color:#d4af37;font-weight:800;margin-bottom:16px">Add Character</div>
    <div style="margin-bottom:16px">
      <label class="lbl">Tier</label>
      <select id="new-tier"><option>Hero</option><option>Lieutenant</option><option>Minion</option></select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-wide" style="flex:1;background:rgba(212,175,55,0.12);border-color:#d4af3766;color:#d4af37" onclick="createChar()">Create</button>
      <button class="btn btn-plain" onclick="closeModal('add')">✕</button>
    </div>
  </div>
</div>

function safeNum(v,fb=0){const n=parseFloat(v);return isNaN(n)?fb:n;}

function computeRanges(){
  ranges={};
  ALL_STAT_KEYS.forEach(k=>{
    const vals=chars.map(c=>safeNum(c[k])).filter(v=>v>0);
    ranges[k]=vals.length?{min:Math.min(...vals),max:Math.max(...vals)}:{min:0,max:100};
  });
}
function computeAvgs(){
  tierAvgs={};
  TIERS.forEach(t=>{
    const g=chars.filter(c=>c.tier===t);
    if(!g.length){tierAvgs[t]={};return;}
    const a={};
    ALL_STAT_KEYS.forEach(k=>{a[k]=g.reduce((s,c)=>s+safeNum(c[k]),0)/g.length;});
    tierAvgs[t]=a;
  });
}

// ============================================================
// STORAGE
// ============================================================
function saveToStorage(){
  try{localStorage.setItem('kw-editor-v1',JSON.stringify(chars));}catch(e){}
}
function loadFromStorage(){
  try{
    const d=localStorage.getItem('kw-editor-v1');
    if(d){chars=JSON.parse(d);return true;}
  }catch(e){}
  return false;
}

// ============================================================
// INIT
// ============================================================
function init(){
  if(!loadFromStorage()){
    chars=parseRows(ROWS_DEFAULT);
  }
  computeRanges();computeAvgs();
  renderList();
  setupHeaderButtons();
}

function setupHeaderButtons(){
  document.getElementById('btn-back').onclick=()=>{selectedId=null;showList();};
  document.getElementById('btn-new').onclick=()=>openModal('add');
  document.getElementById('btn-save').onclick=()=>{
    document.getElementById('save-textarea').value=JSON.stringify(chars,null,2);
    openModal('save');
  };
  document.getElementById('btn-csv').onclick=exportCSV;
}

// ============================================================
// NAVIGATION
// ============================================================
function showList(){
  selectedId=null;subTab='stats';compareId='';
  document.getElementById('btn-back').style.display='none';
  document.getElementById('btn-new').style.display='';
  document.getElementById('header-title').innerHTML=`
    <div style="font-size:14px;font-weight:800;color:#d4af37;letter-spacing:.05em">KINDRED WARS</div>
    <div style="font-size:9px;color:#22224a;letter-spacing:.12em">DATA EDITOR</div>`;
  renderList();
}

function showDetail(id){
  selectedId=id;subTab='stats';
  const char=chars.find(c=>c.id===id);
  document.getElementById('btn-back').style.display='';
  document.getElementById('btn-new').style.display='none';
  document.getElementById('header-title').innerHTML=`
    <div style="font-size:10px;color:#22224a;font-family:monospace">${char.id}</div>
    <div style="font-size:14px;font-weight:700;color:#d0d0e8">${char.name||'Unnamed'}</div>`;
  renderDetail();
}

function updateChar(key,val){
  const idx=chars.findIndex(c=>c.id===selectedId);
  if(idx<0)return;
  chars[idx]={...chars[idx],[key]:val};
  computeRanges();computeAvgs();
  saveToStorage();
}

  });}catch(e){ta.select();document.execCommand('copy');}
}

    const data=JSON.parse(txt);
    if(Array.isArray(data)&&data.length>0){
      chars=data;computeRanges();computeAvgs();saveToStorage();
      closeModal('load');showList();
    } else {msg.textContent='Not a valid character array.';msg.style.display='';}
  }catch(e){msg.textContent='Could not parse. Make sure you copied the full text.';msg.style.display='';}
}
function createChar(){
  const tier=document.getElementById('new-tier').value;
  const pfx=tier[0];
  const used=new Set(chars.filter(c=>c.id&&c.id.startsWith(pfx)).map(c=>parseInt(c.id.slice(1))||0));
  let n=1;while(used.has(n))n++;
  const id=pfx+String(n).padStart(3,'0');
  chars.push({id,name:'',tag:'',tier,cls:'Warrior',type1:'',type1pct:100,type2:'',
    hp:500,regen:10,atk:100,def_:100,spatk:100,spdef:100,spd:5,dodge:10,crit:20,critb:2,
    s1t:'',s1r:'',s1s:'',s1m:'',s2t:'',s2r:'',s2s:'',s2m:'',
    s3t:'',s3r:'',s3s:'',s3m:'',s4t:'',s4r:'',s4s:'',s4m:'',
    scls:'',sclsr:'',sclsq:'',sclscdr:'',sclsstat:'',sclsmod:'',stdAtk:''});
  saveToStorage();closeModal('add');showDetail(id);
}

// ============================================================
// CSV EXPORT
// ============================================================
function exportCSV(){
  const esc=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const hdr=SCHEMA.join(',');
  const rows=chars.map(c=>SCHEMA.map(k=>esc(c[k])).join(','));
  const blob=new Blob([hdr+'\n'+rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='KindredWars.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// RENDER HELPERS
// ============================================================
function el(tag,attrs,inner){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e[k]=v;
    else e.setAttribute(k,v);
  });
  if(inner!==undefined)e.innerHTML=inner;
  return e;
}
function h(tag,attrs={},children=[]){
  const e=el(tag,attrs);
  children.forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function fmtVal(v,step){
  const n=safeNum(v);
  if(step<0.1)return n.toFixed(2);
  if(step<1)return n.toFixed(1);
  return Math.round(n).toString();
}

function mkLabel(txt){const l=el('label',{class:'lbl'},txt);return l;}

function mkSelect(options,value,onChange){
  const s=el('select');
  options.forEach(o=>{
    const val=typeof o==='object'?o.value:o;
    const lbl=typeof o==='object'?o.label:String(o);
    const opt=el('option',{value:val},lbl);
    if(String(val)===String(value))opt.selected=true;
    s.appendChild(opt);
  });
  s.onchange=()=>onChange(s.value);
  return s;
}

function mkField(label,value,onChange,type='text',step){
  const wrap=el('div');
  if(label)wrap.appendChild(mkLabel(label));
  const inp=el('input',{type:type||'text',value:value??''});
  if(step)inp.setAttribute('step',step);
  inp.oninput=()=>onChange(inp.value);
  wrap.appendChild(inp);
  return wrap;
}

function mkSel(label,options,value,onChange,style){
  const wrap=el('div');
  if(style)Object.assign(wrap.style,style);
  if(label)wrap.appendChild(mkLabel(label));
  wrap.appendChild(mkSelect(options,value,onChange));
  return wrap;
}

function mkStepper(label,value,onChange,min,max,step){
  const v=safeNum(value,min);
  const wrap=el('div');
  if(label)wrap.appendChild(mkLabel(label));
  const row=el('div',{class:'stepper'});
  const minus=el('button',{class:'stepper-btn'},'-');
  const valEl=el('div',{class:'stepper-val'},fmtVal(v,step));
  const plus=el('button',{class:'stepper-btn'},'+');
  minus.onclick=()=>{const nv=parseFloat(Math.max(min,v-step).toFixed(4));onChange(nv);};
  plus.onclick=()=>{const nv=parseFloat(Math.min(max,v+step).toFixed(4));onChange(nv);};
  row.appendChild(minus);row.appendChild(valEl);row.appendChild(plus);
  wrap.appendChild(row);
  return wrap;
}

function mkSlider(label,value,onChange,min,max,step){
  const v=safeNum(value,min);
  const fmt=fmtVal(v,step);
  const wrap=el('div');
  if(label){
    const row=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'3px'}});
    row.appendChild(mkLabel(label));
    const valEl=el('span',{style:{fontSize:'12px',color:'#d4af37',fontWeight:'700'}},fmt);
    row.appendChild(valEl);
    wrap.appendChild(row);
  }
  const inp=el('input',{type:'range',min,max,step,value:v});
  inp.oninput=()=>onChange(parseFloat(inp.value));
  wrap.appendChild(inp);
  return wrap;
}

function mkStatBar(statKey,label,value,rng,avg,cmpVal,onChange){
  const v=safeNum(value);
  const pct=rng.max>rng.min?Math.max(0,Math.min(1,(v-rng.min)/(rng.max-rng.min))):0;
  const avgPct=avg!=null&&rng.max>rng.min?Math.max(0,Math.min(1,(avg-rng.min)/(rng.max-rng.min))):null;
  const cmpPct=cmpVal!=null&&rng.max>rng.min?Math.max(0,Math.min(1,(cmpVal-rng.min)/(rng.max-rng.min))):null;
  const step=STAT_STEPS[statKey]||1;
  const color=STAT_COLORS[statKey]||'#d4af37';
  const fmt=fmtVal(v,step);

  const wrap=el('div',{class:'stat-bar-wrap'});
  const row=el('div',{class:'stat-bar-row'});
  const lbl=el('span',{class:'stat-bar-lbl'},label);
  const vals=el('div',{class:'stat-bar-vals'});
  if(cmpVal!=null)vals.appendChild(el('span',{class:'stat-bar-cmp'},'cmp:'+Math.round(cmpVal)));
  if(avg!=null)vals.appendChild(el('span',{class:'stat-bar-avg'},'avg:'+Math.round(avg)));
  const valEl=el('span',{class:'stat-bar-val',style:{color}},fmt);
  vals.appendChild(valEl);
  row.appendChild(lbl);row.appendChild(vals);
  wrap.appendChild(row);

  const track=el('div',{class:'stat-bar-track'});
  const fill=el('div',{class:'stat-bar-fill',style:{width:pct*100+'%',background:color,opacity:'0.75'}});
  track.appendChild(fill);
  if(avgPct!=null){const m=el('div',{class:'stat-bar-marker',style:{left:avgPct*100+'%',background:'rgba(100,180,100,0.6)'}});track.appendChild(m);}
  if(cmpPct!=null){const m=el('div',{class:'stat-bar-marker',style:{left:cmpPct*100+'%',background:'rgba(100,160,220,0.8)',top:'2px',bottom:'2px',borderRadius:'1px'}});track.appendChild(m);}

  function setFromX(clientX){
    const rect=track.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    let nv=rng.min+p*(rng.max-rng.min);
    nv=Math.round(nv/step)*step;
    nv=parseFloat(Math.max(rng.min,Math.min(rng.max,nv)).toFixed(4));
    onChange(nv);
    fill.style.width=(Math.max(0,Math.min(1,(nv-rng.min)/(rng.max-rng.min)))*100)+'%';
    valEl.textContent=fmtVal(nv,step);
  }
  track.onclick=e=>setFromX(e.clientX);
  track.ontouchstart=e=>{e.preventDefault();setFromX(e.touches[0].clientX);};
  wrap.appendChild(track);
  return wrap;
}

function mkActBar(label,value,min,max,step,color,onChange){
  const v=safeNum(value,min);
  const pct=max>min?Math.max(0,Math.min(1,(v-min)/(max-min))):0;
  const fmt=fmtVal(v,step);
  const wrap=el('div',{style:{marginBottom:'10px'}});
  const row=el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'3px'}});
  row.appendChild(el('span',{style:{fontSize:'10px',color:'#5a5a8a',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.07em'}},label));
  const valEl=el('span',{style:{fontSize:'13px',color,fontWeight:'700'}},fmt);
  row.appendChild(valEl);
  wrap.appendChild(row);
  const track=el('div',{class:'stat-bar-track'});
  const fill=el('div',{class:'stat-bar-fill',style:{width:pct*100+'%',background:color,opacity:'0.75'}});
  track.appendChild(fill);
  function setFromX(clientX){
    const rect=track.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    let nv=min+p*(max-min);nv=Math.round(nv/step)*step;
    nv=parseFloat(Math.max(min,Math.min(max,nv)).toFixed(4));
    onChange(nv);fill.style.width=(Math.max(0,Math.min(1,(nv-min)/(max-min)))*100)+'%';valEl.textContent=fmtVal(nv,step);
  }
  track.onclick=e=>setFromX(e.clientX);
  track.ontouchstart=e=>{e.preventDefault();setFromX(e.touches[0].clientX);};
  wrap.appendChild(track);
  return wrap;
}

function mkGrid(children,cols,gap){
  const g=el('div',{style:{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:gap||'8px'}});
  children.forEach(c=>{if(c)g.appendChild(c);});
  return g;
}

    mkStepper('Range',safeNum(char.sclsr),v=>updateChar('sclsr',v),0,6,0.5),
    mkStepper('Qty Required',safeNum(char.sclsq),v=>updateChar('sclsq',v),0,10,1),
    mkStepper('CDR',safeNum(char.sclscdr),v=>updateChar('sclscdr',v),0,5,0.5),
    mkSel('Stat',SYN_STATS,char.sclsstat||'',v=>updateChar('sclsstat',v)),
    mkStepper('Modifier',safeNum(char.sclsmod),v=>updateChar('sclsmod',v),0,5,0.25),
  ],2));
  content.appendChild(clsCard);
}
